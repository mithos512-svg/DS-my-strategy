## Telegram-напоминания — протокол v4

**Известный баг:** scheduled-сообщения приходят на ~1 час позже.
**Решение:** отправлять на 1 час раньше нужного времени.

**Только 4 события через бот:**

| Событие | Нужное время | Отправлять на |
|---------|-------------|---------------|
| Day Open | 9:00 | **8:00** |
| Day Close | 20:30 | **19:30** |
| Week Open (воскресенье) | 9:00 | **8:00** + пометка Week Close + Strategy Session |
| Week Close (воскресенье) | 20:30 | **19:30** |

**Убраны из напоминаний:** йога, резидентуры — отслеживаются самостоятельно.

---

## Nutrition — протокол

**Дневные нормы:**
- Калории: лимит 2000 ккал (предупреждение на 1800)
- Белок: цель 160 г
- Клетчатка: норма 25-30 г

**Алерты:**
- 1800 ккал → Telegram: "⚠️ Приближение к лимиту"
- 2000 ккал → Telegram: "🚨 Лимит дня превышен"

**Правило:** фото еды = съеденная порция. Если на фото больше — пользователь уточняет.

**Шаблоны:**
- "завтрак стандартный" → творог 5% 200г + банан + кофе = ~334 ккал, ~24.8г белка, ~3.1г клетчатки
- "каша стандартная" → овсянка 50г + голубика 35г + груша ½ + кофе = ~305 ккал, ~9.1г белка, ~5.8г клетчатки
- "полдник стандартный" → Protein Pudding 20г + черника 96г + морковь + груша + SportyFeel Bar = ~488 ккал, ~37.8г белка, ~14.3г клетчатки

**Week Close nutrition:** суммировать все дни недели → средние ккал/белок/клетчатка + тренд веса.

