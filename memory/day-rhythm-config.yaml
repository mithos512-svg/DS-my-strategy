## IWE — протокол работы с учебными таблицами (2026-07-08)

**Лайфхак: таблички резидентур через IWE + голос**

**Проблема:** в учебных материалах S1/S2 много таблиц для заполнения (моделирование, чек-листы,
списки затруднений). Они разбросаны по курсу, легко потерять или пропустить.

**Решение (протокол):**
1. Claude находит нужную табличку в Knowledge Base (IWE:knowledge_search)
2. Сохраняет её в `current/learning-journal/YYYY-MM-DD.md` как заготовку
3. Пользователь заполняет голосом (мышление проговариванием) — Claude записывает ответы
4. Заполненная таблица остаётся в личной базе знаний навсегда

**Результат:**
- Все задания пройдены и сохранены в личной базе
- Голосовой ввод снимает барьер "писать трудно"
- Мышление проговариванием = практика S2 в действии
- Таблицы не теряются, доступны через personal_memory_search

**Применено сегодня:** Таблица 4.14 (Список затруднений, мышление письмом) — заполнена голосом.

**Следующие таблицы для поиска (по мере прохождения курса):**
- S1: таблицы из раздела "Собранность и внимание" (Глава 3)
- S2: таблицы из раздела "Медленное чтение", "ВДВ конвейер"

