## Месячная Strategy Session — протокол (добавлено 2026-07-09)

**Когда:** первое воскресенье каждого месяца (вместо обычной недельной сессии, расширенный формат)
**Ближайшая:** 2 августа 2026

**Повестка месячной сессии:**
1. Итоги месяца — что выполнено по всем РП, что не выполнено, почему
2. Nutrition — средние за месяц (ккал/белок/клетчатка), тренд веса
3. Параллельные переходы — в каких переходах сейчас нахожусь, куда движутся
4. Неудовлетворённости из inbox — накопившиеся за месяц, приоритизация
5. Корректировка годовых целей — актуальны ли, нужны ли изменения
6. IWE Roadmap — прогресс по 14 элементам, что добавить в следующем месяце
7. Формирование WeekPlan первой недели нового месяца

**Telegram-напоминание:** ставить в субботу вечером перед первым воскресеньем месяца
(за день, чтобы подготовиться морально).

**Статус:** добавлено в ритм. Первая месячная сессия — 2 августа 2026.

