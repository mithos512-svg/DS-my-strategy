## Вес — протокол записи (обновлено 2026-07-07)

**Одна команда → два места:**
При получении веса утром записывать одновременно:
1. В `current/weight-log.md` — строка в таблицу лога
2. В `current/DayPlan {дата}.md` — строка "Вес утром: X кг"

Формат в weight-log:
`| YYYY-MM-DD | X кг | ±X кг | комментарий |`

Формат в DayPlan:
`## Вес утром: X кг`

