## Telegram-напоминания — финальный протокол (2026-07-06, v4)

**Известный баг:** scheduled-сообщения приходят на ~1 час позже.
**Решение:** отправлять на 1 час раньше как компенсация.

### Только 4 события через бот:

| Событие | Нужное время | Отправлять на |
|---------|-------------|---------------|
| Day Open | 9:00 | **8:00** |
| Day Close | 20:30 | **19:30** |
| Week Open (воскресенье) | 9:00 | **8:00** (с пометкой Week Close + Strategy Session) |
| Week Close (воскресенье вечер) | 20:30 | **19:30** (с пометкой Week Close) |

**Убраны из напоминаний:** йога, резидентуры — отслеживаются самостоятельно.

### Чек-листы (финальные)

**Day Open:**
1. Записать вес (утром, натощак) → weight-log.md
2. Проверить день недели → добавить спорт по расписанию
3. Проверить inbox
4. Собрать DayPlan → current/DayPlan {дата}.md
5. Поставить Telegram на Day Close (отправлять на **19:30**)

**Day Close:**
1. Итоги дня — что выполнено/перенесено
2. Финальный nutrition-итог дня
3. Append learning-journal дня в общий архив
4. DayPlan → archive/day-plans/
5. Forced reindex: IWE:personal_reindex(source="DS-my-strategy")
6. Поставить Telegram на Day Open завтра (отправлять на **8:00**)
7. Если завтра воскресенье → добавить в текст "Week Close + Strategy Session"

