## Nutrition — светофор и нормы (2026-07-04, v3)

**Дневные нормы:**
- Калории: лимит 2000 ккал (предупреждение на 1800)
- Белок: цель 160 г
- Клетчатка: норма 25-30 г (используется середина — 27.5 г как ориентир)

**Светофор в итоговой таблице дня — новая колонка:**
- 🟢 зелёный — в пределах нормы (калории ≤1800, белок ≥ цели или близко, клетчатка ≥25г)
- 🟡 жёлтый — пограничная зона (калории 1800-2000, белок 70-99% от цели, клетчатка 15-25г)
- 🔴 красный — превышение/недобор (калории >2000, белок <70% от цели, клетчатка <15г)

