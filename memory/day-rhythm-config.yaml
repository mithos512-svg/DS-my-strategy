## Nutrition tracking — протокол (добавлено 2026-07-04)

**Статус:** экспериментальная фича, тестируется.

Правило: фото еды = съеденная порция, если пользователь явно не уточнил обратное
(например "это было на двоих" или "съел половину").

Хранение: current/nutrition-log/YYYY-MM-DD.md (split by day, как learning-journal).
На Day Close — опционально суммировать в DayPlan итоги, если польза подтвердится после теста.

