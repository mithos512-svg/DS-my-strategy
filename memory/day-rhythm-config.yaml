## Telegram-напоминания — обновлённый протокол (2026-07-06, v3)

**Известный баг:** scheduled-сообщения приходят на ~1 час позже указанного времени.
**Решение:** отправлять на 1 час раньше нужного времени как компенсация.

### Таблица отправки (с компенсацией +1ч)

| Событие | Нужное время | Отправлять на |
|---------|-------------|---------------|
| Day Open | 9:00 | **8:00** |
| Day Close | 20:30 | **19:30** |
| Week Close (воскресенье) | 9:00 | **8:00** (с пометкой о Week Close) |
| Резидентура S1 (вс) за 15 мин до 11:00 MSK/10:00 local | 9:45 | **8:45** |
| Резидентура S2 (пн) за 15 мин до 18:00 MSK/17:00 local | 16:45 | **15:45** |
| Йога пн 19:15 за 30 мин | 18:45 | **17:45** |
| Йога чт 19:45 за 30 мин | 19:15 | **18:15** |
| Йога сб 08:30 за 30 мин | 08:00 | **07:00** |

### Обновлённые чек-листы

**Day Open:**
1. Записать вес (утром, натощак) → weight-log.md
2. Проверить день недели → добавить спорт по расписанию
3. Проверить inbox
4. Собрать DayPlan → current/DayPlan {дата}.md
5. Поставить Telegram на Day Close (отправлять на **19:30**)
6. Поставить Telegram на спорт если сегодня йога (с компенсацией -1ч)

**Day Close:**
1. Итоги дня — что выполнено/перенесено
2. Финальный nutrition-итог дня
3. Append learning-journal дня в общий архив
4. DayPlan → archive/day-plans/
5. Forced reindex: IWE:personal_reindex(source="DS-my-strategy")
6. Поставить Telegram на Day Open завтра (отправлять на **8:00**)
7. Если завтра воскресенье → добавить в текст напоминания Week Close + Strategy Session

