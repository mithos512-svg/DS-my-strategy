## Day Close — чек-лист (обновлено 2026-07-04)

Стандартные шаги при закрытии дня:
1. Итоги дня — что выполнено/перенесено
2. Обновить DayPlan → archive/day-plans/
3. **Поставить Telegram-напоминание на завтра 9:00** через IWE:send_telegram_message
   (recurring-команды в @aist_me_bot нет, ставим вручную каждый раз)
4. Если завтра воскресенье — включить в напоминание Week Close + Strategy Session

