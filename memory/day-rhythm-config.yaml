## Nutrition — недельная агрегация (добавлено 2026-07-04)

**Правило:** на Week Close (воскресенье) суммировать nutrition-log за все дни недели и
рассчитать средние показатели.

**Формат недельной сводки** (добавляется в WeekPlan при Week Close):

```
### Nutrition — итоги недели

| День | Ккал | Белок | Клетчатка |
|------|------|-------|-----------|
| Пн   | ...  | ...   | ...       |
| Вт   | ...  | ...   | ...       |
| ...  | ...  | ...   | ...       |

**Средние за неделю:**
- Калории: X ккал/день
- Белок: X г/день
- Клетчатка: X г/день
```

**Источник данных:** current/nutrition-log/YYYY-MM-DD.md за каждый день недели (итоговые
блоки "Суммарно за день" из каждого файла).

**Обновление Day Close чек-листа:** каждый день итоговая сумма ккал/белок/клетчатка должна
быть явно посчитана в конце файла nutrition-log дня — секция "Итог дня" обязательна,
чтобы Week Close мог просто собрать эти итоги без пересчёта с нуля.

