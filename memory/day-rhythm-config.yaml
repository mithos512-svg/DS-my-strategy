## Day Close — чек-лист (обновлено 2026-07-04, v2)

Стандартные шаги при закрытии дня:
1. Итоги дня — что выполнено/перенесено
2. Обновить DayPlan → archive/day-plans/
3. **Форсировать reindex** через IWE:personal_reindex(source="DS-my-strategy") — чтобы
   personal_get_document/personal_memory_search видели свежие файлы к завтрашнему дню
4. Поставить Telegram-напоминание на завтра 9:00 через IWE:send_telegram_message
   (recurring-команды в @aist_me_bot нет, ставим вручную каждый раз)
5. Если завтра воскресенье — включить в напоминание Week Close + Strategy Session

