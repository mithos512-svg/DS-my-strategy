## Nutrition alert — правило (добавлено 2026-07-04)

**Порог:** 1800 ккал/день.

**Механизм:** нет фонового мониторинга — при каждой новой записи приёма пищи в течение дня
считать текущую сумму за день. Если сумма превышает 1800 ккал — сразу отправить
Telegram-алерт через IWE:send_telegram_message (немедленно, не по расписанию).

**Ограничение:** сработает только если пользователь продолжает присылать записи о еде в чат —
нет автономного отслеживания без участия в диалоге.

