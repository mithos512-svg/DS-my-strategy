## Day Open — чек-лист (обновлено 2026-07-06, v2)

Стандартные шаги при открытии дня:
1. **Записать вес** (утром, натощак) → обновить current/weight-log.md
2. Проверить день недели → добавить спорт по расписанию (йога пн/чт/сб, спортзал вт/пт/вс)
3. Проверить inbox — есть ли необработанные заметки
4. Собрать DayPlan → current/DayPlan {дата}.md
5. Поставить Telegram-напоминание на сегодня 20:30 через IWE:send_telegram_message
   — текст: "Время Day Close — не забудь записать ужин и закрыть день"

