## Правило ритма (зафиксировано 2026-07-04)

**Week Close / Strategy Session — по воскресеньям**, не в последний рабочий день недели.
IWE работает без выходных — ежедневный Day Open/Close продолжается в любой день недели.

Ассистенту: напоминать о Week Close, если сегодня воскресенье и неделя ещё не закрыта.

