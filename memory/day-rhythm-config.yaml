## Nutrition — протокол учёта веса

- Взвешивание: утром, натощак
- При записи веса → обновлять `current/weight-log.md` ЦЕЛИКОМ (не дописывать строку)
- На Week Close: средний вес за неделю + тренд

---

## Протокол учебных таблиц (резидентуры)

1. Claude находит табличку в Knowledge Base (IWE:knowledge_search)
2. Сохраняет в `current/learning-journal/YYYY-MM-DD.md`
3. Пользователь заполняет голосом → Claude записывает
4. Таблица остаётся в личной базе знаний

---

## Творческий конвейер (таблица 4.18 S2)

- **Стадия 1:** мимолётные заметки в течение дня → `memory/inbox/fleeting-notes.md` голосом
- **Стадия 2:** разбор заметок → черновики (на Strategy Session по воскресеньям)
- **Стадия 3:** выбор темы → `current/posts/ideas.md`
- **Стадия 4:** публикация → 1 пост/неделю, клуб МИМ (systemsworld.club)

