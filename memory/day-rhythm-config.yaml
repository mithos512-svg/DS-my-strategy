## Nutrition alert — обновлённое правило (2026-07-04, v2)

**Два порога:**
- **1800 ккал** — уровень уведомления (предупреждение, "приближаешься к лимиту")
- **2000 ккал** — дневной лимит (превышение)

**Механизм:**
При каждой новой записи приёма пищи считать текущую сумму за день.
- Если сумма пересекает 1800 (и ещё не было уведомления сегодня) → Telegram: "⚠️ Приближение к лимиту: X ккал"
- Если сумма пересекает 2000 → Telegram: "🚨 Лимит дня превышен: X ккал"

Оба уведомления немедленные (не по расписанию), отправляются в момент записи, когда порог
пересечён впервые за день — не дублировать при каждой последующей записи, если порог уже
был пересечён и уведомление отправлено.

**Сегодня (2026-07-04):** фактический итог дня ~2310-2510 ккал — оба порога пройдены.
Первое уведомление (1800) уже отправлено ранее. Лимит (2000) был также превышен, но отдельное
уведомление не отправлялось — на будущее отправлять оба уведомления по мере пересечения порогов.

