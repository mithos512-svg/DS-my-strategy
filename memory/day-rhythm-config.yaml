## Уточнение по расписанию (2026-07-04, v2)

**Семинары FPF-1..5:** пересекаются по времени с резидентурами → слушаются в записи.
Не требуют напоминаний в моменте. Добавляются пунктом в понедельничную Strategy Session
как задача "посмотреть в записи" с накоплением по мере выхода новых.

**Резидентуры S1/S2:** требуют live-участия → Telegram-напоминание за 15 минут до каждой встречи.

### Резидентура S1 — Системное саморазвитие
Каждое воскресенье, 11:30 MSK, с 05.07.2026 по 16.08.2026 (7 сессий)
→ напоминание в 11:15 MSK в день сессии

### Резидентура S2 — Методы саморазвития
Каждый понедельник, 18:00 MSK, с 06.07.2026 по 17.08.2026 (7 сессий)
→ напоминание в 17:45 MSK в день сессии

**Действие:** ставить Telegram-напоминания за 15 мин до каждой сессии резидентуры вручную
(нет recurring в @aist_me_bot), по мере приближения к каждой дате.

