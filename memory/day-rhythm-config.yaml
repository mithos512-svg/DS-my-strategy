## Расписание йоги (обновлено 2026-07-06)

Конкретное время по местному (UTC+2):
- **Понедельник** — 19:15
- **Четверг** — 19:45
- **Суббота** — 08:30

Ассистенту: при Day Open в эти дни добавлять йогу с конкретным временем.
Напоминание ставить за 30 минут до начала (пн → 18:45, чт → 19:15, сб → 08:00).

