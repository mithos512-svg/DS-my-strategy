# Day Rhythm Config — протоколы и правила IWE

## Стандарты обозначений

**В DayPlan/WeekPlan — приоритеты РП:**
- P1 — критический, выполнить обязательно
- P2 — средний, важно но допустим перенос
- P3 — поддерживающий (спорт, здоровье, ритм)

**В nutrition-логе — достижение нормы:**
- 🟢 в норме
- 🟡 пограничная зона
- 🔴 недобор или превышение

---

## Расписание спорта (постоянное)

- **Йога** — пн, чт, сб
  - Пн: 19:15 местного
  - Чт: 19:45 местного
  - Сб: 08:30 местного
- **Спортзал** — вт, пт, вс (всегда утром, первым РП дня)

---

## Расписание резидентур МИМ

- **Резидентура "Системное саморазвитие"** — вс, 11:00 MSK (10:00 местного), 05.07–16.08.2026
- **Резидентура "Методы саморазвития"** — пн, 18:00 MSK (17:00 местного), 06.07–17.08.2026

**Семинары FPF** (пересекаются с резидентурами → смотреть в записи, разбирать на Strategy Session):
- FPF-1: 12.07 | FPF-2: 19.07 | FPF-3: 26.07 | FPF-4: 02.08 | FPF-5: 09.08

---

## Day Open — чек-лист

1. Записать вес (утром, натощак) → обновить `current/weight-log.md` целиком
2. Проверить день недели → добавить спорт по расписанию
3. Проверить inbox
4. Собрать DayPlan → `current/DayPlan {дата}.md`
5. Поставить Telegram на Day Close (отправлять на **19:30**, придёт ~20:30)

---

## Day Close — чек-лист

1. Итоги дня — что выполнено/перенесено
2. Финальный nutrition-итог дня
3. Append learning-journal дня в общий архив (`current/learning-journal.md`)
4. DayPlan → `archive/day-plans/`
5. Forced reindex: `IWE:personal_reindex(source="DS-my-strategy")`
6. Поставить Telegram на Day Open завтра (отправлять на **8:00**, придёт ~9:00)
7. Если завтра воскресенье → добавить в текст "Week Close + Strategy Session"

---

## Strategy Session (воскресенье) — чек-лист

1. Week Close — итоги недели по РП
2. Nutrition — сводка за неделю (ккал/белок/клетчатка/вес)
3. **Разбор заметок:**
   - Просмотр `memory/inbox/fleeting-notes.md` за неделю
   - Просмотр `current/learning-journal/` за неделю
   - Что тянет на черновик поста? → `current/posts/ideas.md`
   - Выбрать 1 тему для проработки на следующей неделе
4. Разбор inbox — неудовлетворённости → РП
5. Формирование WeekPlan следующей недели
6. IWE Roadmap — прогресс по 14 элементам

**Месячная Strategy Session** — первое воскресенье месяца (расширенный формат ~2ч).
Ближайшая: 2 августа 2026.
Добавить к обычной сессии: параллельные переходы, корректировка годовых целей, nutrition за месяц.

